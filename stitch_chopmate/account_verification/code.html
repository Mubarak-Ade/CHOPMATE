<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Account Verification - RestoManage</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a3322", // A slightly lighter dark for cards
                        "text-main-light": "#0d1b12",
                        "text-main-dark": "#f0fdf4",
                        "text-sub-light": "#4c5950",
                        "text-sub-dark": "#a7b8ad",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-main-light dark:text-text-main-dark min-h-screen flex flex-col">
<!-- Top Navbar -->
<header class="w-full border-b border-[#e7f3eb] dark:border-[#2a4030] bg-surface-light dark:bg-surface-dark px-4 py-3 sticky top-0 z-50">
<div class="layout-container flex justify-center w-full">
<div class="layout-content-container flex max-w-[960px] w-full items-center justify-between">
<div class="flex items-center gap-3">
<div class="size-8 bg-primary/20 text-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">restaurant_menu</span>
</div>
<h2 class="text-text-main-light dark:text-text-main-dark text-lg font-bold leading-tight tracking-tight">RestoManage</h2>
</div>
<button class="hidden sm:flex h-9 cursor-pointer items-center justify-center rounded-lg px-4 bg-background-light dark:bg-background-dark hover:bg-[#e7f3eb] dark:hover:bg-[#203626] text-text-main-light dark:text-text-main-dark text-sm font-bold transition-colors">
<span class="truncate">Contact Support</span>
</button>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
<div class="w-full max-w-[640px] flex flex-col gap-6">
<!-- Progress Bar -->
<div class="w-full flex flex-col gap-2 mb-4">
<div class="flex justify-between items-end">
<span class="text-text-main-light dark:text-text-main-dark text-sm font-semibold">Step 3 of 4</span>
<span class="text-text-sub-light dark:text-text-sub-dark text-xs">Verification</span>
</div>
<div class="h-2 w-full bg-[#cfe7d7] dark:bg-[#2a4030] rounded-full overflow-hidden">
<div class="h-full bg-primary w-3/4 rounded-full"></div>
</div>
</div>
<!-- Verification Card -->
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm border border-[#e7f3eb] dark:border-[#2a4030] p-6 sm:p-10 flex flex-col items-center text-center">
<!-- Icon -->
<div class="size-16 rounded-full bg-primary/10 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-3xl">mark_email_unread</span>
</div>
<!-- Headline -->
<h1 class="text-2xl sm:text-3xl font-bold mb-2 text-text-main-light dark:text-text-main-dark">Check your email</h1>
<!-- Body Text -->
<p class="text-text-sub-light dark:text-text-sub-dark text-base mb-8 max-w-md mx-auto leading-relaxed">
                    We sent a 6-digit verification code to <span class="font-semibold text-text-main-light dark:text-text-main-dark">restaurant@example.com</span>. Enter it below to confirm your account.
                </p>
<!-- Code Input Form -->
<form class="w-full max-w-sm flex flex-col gap-6" onsubmit="event.preventDefault();">
<div class="flex gap-2 sm:gap-4 justify-center">
<input autofocus="" class="size-12 sm:size-14 text-center text-2xl font-bold rounded-xl border-2 border-[#e7f3eb] dark:border-[#2a4030] bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-gray-300 dark:placeholder:text-gray-600" maxlength="1" placeholder="-" type="text"/>
<input class="size-12 sm:size-14 text-center text-2xl font-bold rounded-xl border-2 border-[#e7f3eb] dark:border-[#2a4030] bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-gray-300 dark:placeholder:text-gray-600" maxlength="1" placeholder="-" type="text"/>
<input class="size-12 sm:size-14 text-center text-2xl font-bold rounded-xl border-2 border-[#e7f3eb] dark:border-[#2a4030] bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-gray-300 dark:placeholder:text-gray-600" maxlength="1" placeholder="-" type="text"/>
<input class="size-12 sm:size-14 text-center text-2xl font-bold rounded-xl border-2 border-[#e7f3eb] dark:border-[#2a4030] bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-gray-300 dark:placeholder:text-gray-600" maxlength="1" placeholder="-" type="text"/>
<input class="size-12 sm:size-14 text-center text-2xl font-bold rounded-xl border-2 border-[#e7f3eb] dark:border-[#2a4030] bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-gray-300 dark:placeholder:text-gray-600" maxlength="1" placeholder="-" type="text"/>
<input class="size-12 sm:size-14 text-center text-2xl font-bold rounded-xl border-2 border-[#e7f3eb] dark:border-[#2a4030] bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-gray-300 dark:placeholder:text-gray-600" maxlength="1" placeholder="-" type="text"/>
</div>
<div class="flex flex-col gap-4 mt-2">
<button class="w-full h-12 bg-primary hover:bg-[#0fd650] text-[#0d1b12] text-base font-bold rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2" type="submit">
<span>Verify Account</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<div class="text-sm text-text-sub-light dark:text-text-sub-dark flex items-center justify-center gap-1">
<span>Code expires in</span>
<span class="font-mono font-medium text-text-main-light dark:text-text-main-dark">09:59</span>
</div>
</div>
</form>
<div class="mt-8 pt-6 border-t border-[#e7f3eb] dark:border-[#2a4030] w-full">
<p class="text-sm text-text-sub-light dark:text-text-sub-dark">
                        Didn't receive the email? 
                        <button class="text-text-main-light dark:text-text-main-dark font-bold hover:underline decoration-primary decoration-2 underline-offset-4 ml-1">Click to resend</button>
</p>
</div>
</div>
<!-- Footer Links -->
<div class="flex justify-center gap-6 text-sm text-text-sub-light dark:text-text-sub-dark mt-4">
<a class="hover:text-text-main-light dark:hover:text-text-main-dark transition-colors" href="#">Privacy Policy</a>
<span class="text-gray-300 dark:text-gray-700">•</span>
<a class="hover:text-text-main-light dark:hover:text-text-main-dark transition-colors" href="#">Terms of Service</a>
<span class="text-gray-300 dark:text-gray-700">•</span>
<a class="hover:text-text-main-light dark:hover:text-text-main-dark transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-base">help</span>
                    Help Center
                </a>
</div>
</div>
</main>
<!-- Background Decoration (Abstract Pattern) -->
<div class="fixed inset-0 pointer-events-none -z-10 opacity-40 dark:opacity-10 overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] size-[600px] bg-primary/20 blur-[120px] rounded-full mix-blend-multiply dark:mix-blend-normal"></div>
<div class="absolute top-[40%] -left-[10%] size-[500px] bg-blue-400/20 blur-[100px] rounded-full mix-blend-multiply dark:mix-blend-normal"></div>
</div>
</body></html>
