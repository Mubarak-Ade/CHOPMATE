<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | Marketplace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#dadad9",
                    "surface-bright": "#f9f9f8",
                    "on-surface": "#1a1c1c",
                    "on-secondary-fixed": "#201a17",
                    "on-error": "#ffffff",
                    "inverse-on-surface": "#f1f1f0",
                    "on-primary-fixed": "#380c00",
                    "on-tertiary-fixed-variant": "#005321",
                    "error-container": "#ffdad6",
                    "secondary-fixed-dim": "#d0c4bf",
                    "primary-fixed": "#ffdbcf",
                    "secondary-container": "#ede0da",
                    "error": "#ba1a1a",
                    "surface-container-low": "#f4f4f3",
                    "surface": "#f9f9f8",
                    "inverse-surface": "#2f3130",
                    "outline": "#8d7168",
                    "inverse-primary": "#ffb59c",
                    "surface-tint": "#aa3700",
                    "on-secondary-container": "#6b635e",
                    "on-error-container": "#93000a",
                    "background": "#f9f9f8",
                    "tertiary-fixed-dim": "#4ae176",
                    "surface-variant": "#e2e2e2",
                    "on-primary-container": "#fffbff",
                    "on-surface-variant": "#594139",
                    "surface-container-high": "#e8e8e7",
                    "on-tertiary-container": "#f7fff3",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#00873b",
                    "on-primary": "#ffffff",
                    "surface-container": "#eeeeed",
                    "on-secondary": "#ffffff",
                    "surface-container-highest": "#e2e2e2",
                    "on-secondary-fixed-variant": "#4d4541",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#002109",
                    "tertiary": "#006b2d",
                    "primary": "#a63500",
                    "outline-variant": "#e1bfb4",
                    "on-primary-fixed-variant": "#822800",
                    "primary-fixed-dim": "#ffb59c",
                    "secondary-fixed": "#ede0da",
                    "secondary": "#655d58",
                    "primary-container": "#cc4911",
                    "tertiary-fixed": "#6bff8f",
                    "on-background": "#1a1c1c"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-neutral-900 text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopNavBar -->
<header class="bg-white dark:bg-neutral-900 border-b border-gray-200 dark:border-neutral-800 shadow-sm fixed top-0 w-full z-50">
<div class="flex justify-between items-center px-6 py-3 w-full font-['Inter'] antialiased">
<div class="text-xl font-bold text-[#E85D26]">Sign Up</div>
<div class="flex items-center gap-6">
<a class="text-gray-500 dark:text-neutral-400 hover:text-gray-900 dark:hover:text-neutral-100 transition-colors" href="#">Marketplace</a>
<a class="text-gray-500 dark:text-neutral-400 hover:text-gray-900 dark:hover:text-neutral-100 transition-colors" href="#">Features</a>
<a class="text-[#E85D26] font-semibold border-b-2 border-[#E85D26] pb-1" href="#">Log In</a>
</div>
</div>
</header>
<!-- Main Content: Sign-up Canvas -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 relative overflow-hidden">
<!-- Aesthetic Background Elements (Warm Dark Vibes) -->
<div class="absolute inset-0 bg-[#1A1A1A]"></div>
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-[#E85D26] opacity-10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-primary-container opacity-5 blur-[100px] rounded-full"></div>
<!-- Central Elegant Card -->
<div class="relative z-10 w-full max-w-[440px] bg-white dark:bg-neutral-800 rounded-lg shadow-lg overflow-hidden p-8 md:p-10 border border-neutral-700/50 backdrop-blur-sm">
<div class="space-y-8">
<!-- Header -->
<div class="text-center">
<h1 class="text-2xl font-semibold text-neutral-900 dark:text-neutral-100 tracking-tight">Create your account</h1>
<p class="text-sm text-gray-500 dark:text-neutral-400 mt-2">Join our premium marketplace community today.</p>
</div>
<!-- Quick Sign Up -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-neutral-200 dark:border-neutral-700 rounded-lg hover:bg-neutral-50 dark:hover:bg-neutral-700/50 transition-all active:scale-95 duration-150">
<span class="material-symbols-outlined text-[20px]" data-icon="google">google</span>
<span class="text-sm font-medium text-neutral-700 dark:text-neutral-200">Google</span>
</button>
<button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-neutral-200 dark:border-neutral-700 rounded-lg hover:bg-neutral-50 dark:hover:bg-neutral-700/50 transition-all active:scale-95 duration-150">
<span class="material-symbols-outlined text-[20px]" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-sm font-medium text-neutral-700 dark:text-neutral-200">Apple</span>
</button>
</div>
<!-- Divider -->
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-neutral-200 dark:border-neutral-700"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-neutral-800 px-3 text-neutral-500 dark:text-neutral-400">or</span>
</div>
</div>
<!-- Form -->
<form class="space-y-4">
<div class="space-y-1.5">
<label class="text-sm font-medium text-neutral-700 dark:text-neutral-300 ml-1" for="name">Full Name</label>
<input class="w-full px-4 py-2.5 bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 rounded-lg focus:ring-2 focus:ring-[#E85D26] focus:border-transparent outline-none text-neutral-900 dark:text-white placeholder-neutral-400 transition-all" id="name" placeholder="John Doe" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-sm font-medium text-neutral-700 dark:text-neutral-300 ml-1" for="email">Email</label>
<input class="w-full px-4 py-2.5 bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 rounded-lg focus:ring-2 focus:ring-[#E85D26] focus:border-transparent outline-none text-neutral-900 dark:text-white placeholder-neutral-400 transition-all" id="email" placeholder="john@example.com" type="email"/>
</div>
<div class="space-y-1.5">
<label class="text-sm font-medium text-neutral-700 dark:text-neutral-300 ml-1" for="password">Password</label>
<input class="w-full px-4 py-2.5 bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 rounded-lg focus:ring-2 focus:ring-[#E85D26] focus:border-transparent outline-none text-neutral-900 dark:text-white placeholder-neutral-400 transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full mt-4 py-3 px-4 bg-[#E85D26] text-white font-semibold rounded-lg hover:bg-[#d14d1d] active:scale-[0.98] transition-all shadow-md flex justify-center items-center gap-2" type="submit">
                        Sign Up
                        <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<p class="text-center text-sm text-neutral-600 dark:text-neutral-400">
                    Already have an account? 
                    <a class="text-[#E85D26] font-semibold hover:underline decoration-2 underline-offset-4" href="#">Log in</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-white dark:bg-neutral-900 border-t border-gray-200 dark:border-neutral-800 py-8">
<div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-sm font-['Inter'] text-gray-500 dark:text-neutral-400">
<div class="opacity-100">
                © 2024 Design System Inc. All rights reserved.
            </div>
<div class="flex gap-6">
<a class="text-gray-500 hover:text-gray-900 dark:text-neutral-400 dark:hover:text-neutral-100 hover:underline transition-all" href="#">Privacy Policy</a>
<a class="text-gray-500 hover:text-gray-900 dark:text-neutral-400 dark:hover:text-neutral-100 hover:underline transition-all" href="#">Terms of Service</a>
<a class="text-gray-500 hover:text-gray-900 dark:text-neutral-400 dark:hover:text-neutral-100 hover:underline transition-all" href="#">Help Center</a>
</div>
</div>
</footer>
</body></html>
