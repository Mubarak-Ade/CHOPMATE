</div>
<h2 class="text-[#1b0e0f] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">RestaurantSearch</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="flex items-center gap-9">
<a class="text-[#1b0e0f] dark:text-white/80 text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Explore</a>
<a class="text-[#1b0e0f] dark:text-white/80 text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Features</a>
<a class="text-[#1b0e0f] dark:text-white/80 text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Pricing</a>
</div>
<div class="flex gap-2">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Sign Up</span>
</button>
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary/10 text-primary dark:bg-white/10 dark:text-white text-sm font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Log In</span>
</button>
</div>
</div>
</header>
<!-- Main Signup Container -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="bg-white dark:bg-background-dark/80 w-full max-w-[520px] rounded-xl shadow-2xl border border-primary/5 p-8 md:p-10">
<!-- Headline and Subtext -->
<div class="text-center mb-8">
<h1 class="text-[#1b0e0f] dark:text-white tracking-tight text-[32px] font-bold leading-tight pb-2">Create your account</h1>
<p class="text-[#964f55] dark:text-primary/70 text-base font-normal leading-normal">Discover the best local dining experiences.</p>
</div>
<!-- Social Signup Buttons -->
<div class="flex flex-col gap-3 mb-6">
<button class="flex items-center justify-center gap-3 w-full h-12 px-5 bg-background-light dark:bg-white/5 border border-primary/10 rounded-lg text-[#1b0e0f] dark:text-white text-base font-semibold hover:bg-primary/5 transition-all">
<img alt="" class="size-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwAStSeDGSfFDxP7KeIANGDkizPGzG_XgyNBkP_wMBJh136TCmdFatOCaeqa-y1Dj0wVQvjbqF92ySnleAI2-i5mjdBpfvig9itlYT4CiEO-HSXR0aro8ekAoPhn3YquFuHvQp2n4fwKkOfMKWKDWtJ5Z_V6rF0Ta_mSbS796dTYscKq9ZlufxAqxjC9vRYo6E0ySjF1GURERcQYxK-r56nrcMFi_cGcdKC3uUrbdCJ7HXVp1pkKYl_mkYaXPs5FcIUpdQmZkJTX8"/>
<span class="truncate">Sign up with Google</span>
</button>
<button class="flex items-center justify-center gap-3 w-full h-12 px-5 bg-background-light dark:bg-white/5 border border-primary/10 rounded-lg text-[#1b0e0f] dark:text-white text-base font-semibold hover:bg-primary/5 transition-all">
<span class="material-symbols-outlined text-2xl">ios</span>
<span class="truncate">Sign up with Apple</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 mb-6">
<div class="h-px bg-primary/10 flex-grow"></div>
<span class="text-[#964f55] dark:text-primary/50 text-sm font-medium">or</span>
<div class="h-px bg-primary/10 flex-grow"></div>
</div>
<!-- Manual Signup Form -->
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-1.5">
<label class="text-[#1b0e0f] dark:text-white/90 text-sm font-semibold ml-1">Full Name</label>
<input class="w-full h-12 px-4 rounded-lg bg-background-light dark:bg-white/5 border border-primary/10 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all dark:text-white placeholder:text-[#964f55]/50" placeholder="Jane Doe" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-[#1b0e0f] dark:text-white/90 text-sm font-semibold ml-1">Email Address</label>
<input class="w-full h-12 px-4 rounded-lg bg-background-light dark:bg-white/5 border border-primary/10 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all dark:text-white placeholder:text-[#964f55]/50" placeholder="jane@example.com" type="email"/>
</div>
<div class="flex flex-col gap-1.5 relative">
<label class="text-[#1b0e0f] dark:text-white/90 text-sm font-semibold ml-1">Create Password</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg bg-background-light dark:bg-white/5 border border-primary/10 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all dark:text-white placeholder:text-[#964f55]/50 pr-12" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#964f55] hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<p class="text-xs text-[#964f55]/70 mt-1 ml-1">Must be at least 8 characters with a symbol.</p>
</div>
<button class="mt-4 flex items-center justify-center w-full h-12 bg-primary text-white rounded-lg text-lg font-bold tracking-wide hover:shadow-lg hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                    Create Account
                </button>
</form>
<!-- Bottom Link -->
<div class="mt-8 pt-6 border-t border-primary/5 text-center">
<p class="text-[#964f55] dark:text-primary/70 text-sm font-medium">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Log In</a>
</p>
</div>
<!-- Footer Compliance -->
<div class="mt-6 text-center">
<p class="text-[10px] text-[#964f55]/50 uppercase tracking-widest">
                    By joining, you agree to our Terms and Privacy Policy.
                </p>
</div>
</div>
</main>
<!-- Simple Footer decorative element -->
<footer class="py-6 text-center">
<p class="text-[#964f55]/40 text-xs">© 2024 RestaurantSearch Inc. All rights reserved.</p>
</footer>
