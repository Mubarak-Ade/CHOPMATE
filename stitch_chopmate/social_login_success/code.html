<style>

        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

<body class="h-full bg-[#f9f9f8] font-body flex items-center justify-center p-6">
<!-- Success Container -->
<main class="w-full max-w-md bg-surface p-8 rounded-xl shadow-md border border-outline-variant/30 flex flex-col items-center text-center">
<!-- User Avatar with Success Badge -->
<div class="relative mb-8">
<div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-sm">
<img alt="User avatar" class="w-full h-full object-cover" data-alt="Close-up portrait of a smiling young professional man with a friendly expression in a brightly lit modern studio setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCwAqTRvMO4RKG4G8jVAKcsyZicTCmluogPyABGeS2tUpepM2cHcYzBCNP72-5XtL8mTNW6IBU8lvrzEw5vD8uUNQbMCQSo_vY48wyvW3gX2nIMX9qh6yENWz3oF3Ntpoczk25BBP6QJoLWcq1eD4eiivAHFaYHxrLeJQvKScKt78Jpqq3Y_kjQ9zNoyBsK45GNK8ajytghv9x9HoKoAkCJ7m35heznf38PpHJ-n7hNivcSdxpaBc1djWDnRu3sWVXIqTB-_naZlY"/>
</div>
<!-- Large Checkmark Badge -->
<div class="absolute -bottom-1 -right-1 bg-white rounded-full p-1 shadow-sm">
<div class="bg-emerald-500 text-white rounded-full w-8 h-8 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 20px;">check_circle</span>
</div>
</div>
</div>
<!-- Success Text -->
<div class="space-y-2 mb-10">
<h1 class="text-2xl font-semibold text-on-surface tracking-tight">Welcome back!</h1>
<p class="text-on-surface-variant text-base">Successfully logged in with Google</p>
</div>
<!-- Progress Indicator (Subtle Transition Hint) -->
<div class="w-full h-1 bg-surface-container rounded-full mb-10 overflow-hidden">
<div class="h-full bg-brand w-1/3 rounded-full"></div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-brand hover:bg-primary-container text-white font-semibold py-4 px-6 rounded-lg transition-all active:scale-[0.98] brand-shadow flex items-center justify-center gap-2">
            Continue to Dashboard
            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Secondary Info -->
<p class="mt-8 text-xs text-on-secondary-container font-medium tracking-wide">
            Redirecting in 3 seconds...
        </p>
</main>
<!-- Background Decoration -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[5%] w-[40%] h-[40%] bg-brand/5 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -left-[5%] w-[40%] h-[40%] bg-tertiary/5 blur-[120px] rounded-full"></div>
